services:
  postgres:
    image: postgres:16-alpine
    container_name: peerprep-postgres
    environment:
      POSTGRES_DB: peerprep_questions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3011:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_questions"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - peerprep-network

  question-service:
    build: .
    container_name: peerprep-question-service
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: peerprep_questions
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - peerprep-network

volumes:
  postgres_data:

networks:
  peerprep-network:
    name: peerprep-network