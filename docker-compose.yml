services:
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - PORT=${USER_SERVICE_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${USER_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    restart: unless-stopped

  question-service:
    build: ./question-service
    container_name: question-service
    environment:
      - PORT=${QUESTION_SERVICE_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${QUESTION_DB_NAME}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    ports:
      - "${QUESTION_SERVICE_PORT}:${QUESTION_SERVICE_PORT}"
    restart: unless-stopped

  matching-service:
    build: ./matching-service
    container_name: matching-service
    environment:
      PORT: ${MATCHING_SERVICE_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      COLLAB_REDIS_URL: redis://collab-redis:6379
      QUESTION_SERVICE_URL: http://question-service:${QUESTION_SERVICE_PORT}
    ports:
      - "${MATCHING_SERVICE_PORT}:${MATCHING_SERVICE_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      collab-redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collab-redis:
    image: redis:7-alpine
    container_name: collab-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collaboration-service:
    build: ./collaboration_service/backend
    container_name: collaboration-service
    environment:
      - REDIS_URL=redis://collab-redis:6379
    ports:
      - "${COLLAB_SERVICE_PORT}:3000"
      - "${COLLAB_YJS_WS_PORT}:8081"
    depends_on:
      collab-redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      - PORT=${GATEWAY_PORT}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - QUESTION_SERVICE_URL=${QUESTION_SERVICE_URL}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL}
      - COLLAB_SERVICE_URL=${COLLAB_SERVICE_URL}
      - COLLAB_WS_URL=${COLLAB_WS_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      - matching-service
      - collaboration-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${GATEWAY_URL}
        VITE_YJS_WS_URL: ${COLLAB_YJS_WS_URL}
        VITE_CHAT_WS_URL: ${COLLAB_CHAT_WS_URL}
    container_name: frontend
    ports:
      - "80:${FRONTEND_PORT}"
    restart: unless-stopped

volumes:
  user-postgres-data:
  question-postgres-data:
